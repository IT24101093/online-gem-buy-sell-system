<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Management - Admin Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="OrderAdmin.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>

<div class="container">
    <div class="header">
        <h1>🛍️ Order Management</h1>
        <p>Real-time order processing dashboard from Database</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalOrders">0</div>
            <div>Total Orders</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="processingOrders">0</div>
            <div>Processing</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="packedOrders">0</div>
            <div>Packed</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="deliveredOrders">0</div>
            <div>Delivered</div>
        </div>
    </div>

    <div class="orders-grid" id="ordersGrid">
    </div>
</div>

<div id="deleteModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: #1a1a2e; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); max-width: 400px; color: white;">
        <h3 style="color: #ff4d4d; margin-bottom: 15px;">Confirm Delete</h3>
        <p id="deleteMessage" style="margin-bottom: 25px; color: #e0e0e0;">Are you sure you want to delete this order?</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id="cancelDelete" style="padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #4a5568; color: white;">Cancel</button>
            <button id="confirmDelete" style="padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #ff4d4d; color: white;">Delete Permanently</button>
        </div>
    </div>
</div>

<script src="OrderAdmin.js"></script>
</body>
</html>
