<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GemVault - Inventory</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="inventory.css" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
</head>

<body class="text-slate-800 dark:text-slate-100">
  <!-- Top Nav -->
  <nav class="fixed w-full z-50 glass-panel">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="main.html" class="flex items-center gap-2">
        <i class="fa-regular fa-gem text-3xl text-purple-600 dark:text-purple-400"></i>
        <span class="text-2xl font-bold tracking-tight">Gem<span class="text-purple-600 dark:text-purple-400">Vault</span></span>
      </a>

      <div class="flex items-center gap-3">
        <a href="add-gem.html" class="btn-secondary">
          <i class="fas fa-certificate"></i>
          <span class="hidden sm:inline">Add Certified</span>
        </a>
        <a href="Smart-Analysis.html" class="btn-secondary">
          <i class="fas fa-microscope"></i>
          <span class="hidden sm:inline">Smart Analysis</span>
        </a>

        <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition" aria-label="Toggle theme">
          <i class="fas fa-moon dark:hidden text-slate-600"></i>
          <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-28 pb-10 px-6 max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
      <div>
        <h1 class="text-3xl md:text-4xl font-extrabold">Inventory</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-1">Manage certified and smart-analysis gems. Publish to marketplace when ready.</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
        <div class="relative w-full sm:w-80">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input id="searchInput" class="w-full pl-10 pr-3 py-2 rounded-xl border border-slate-200/60 dark:border-slate-700/60 bg-white/70 dark:bg-slate-900/40 backdrop-blur focus:outline-none"
                 placeholder="Search gem type, vendor, id..." />
        </div>
        <select id="sourceFilter" class="w-full sm:w-44 py-2 px-3 rounded-xl border border-slate-200/60 dark:border-slate-700/60 bg-white/70 dark:bg-slate-900/40 backdrop-blur focus:outline-none">
          <option value="all">All Sources</option>
          <option value="certified">Certified</option>
          <option value="analysis">Smart Analysis</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid sm:grid-cols-3 gap-4 mb-6">
      <div class="card p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Total Items</p>
            <p id="statTotal" class="text-2xl font-bold">0</p>
          </div>
          <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-500">
            <i class="fas fa-layer-group"></i>
          </div>
        </div>
      </div>
      <div class="card p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Certified</p>
            <p id="statCertified" class="text-2xl font-bold">0</p>
          </div>
          <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-500">
            <i class="fas fa-certificate"></i>
          </div>
        </div>
      </div>
      <div class="card p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Smart Analysis</p>
            <p id="statAnalysis" class="text-2xl font-bold">0</p>
          </div>
          <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-500">
            <i class="fas fa-microscope"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="card p-10 text-center hidden">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-slate-900/5 dark:bg-white/10 flex items-center justify-center mb-4">
        <i class="fas fa-box-open text-xl text-slate-500 dark:text-slate-300"></i>
      </div>
      <h2 class="text-xl font-bold mb-2">No items yet</h2>
      <p class="text-slate-600 dark:text-slate-400 mb-5">Add a certified gem or run smart analysis, then it will appear here.</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="add-gem.html" class="btn-primary">
          <i class="fas fa-certificate"></i> Add Certified
        </a>
        <a href="Smart-Analysis.html" class="btn-secondary">
          <i class="fas fa-microscope"></i> Smart Analysis
        </a>
      </div>
    </div>

    <!-- List -->
    <div id="list" class="grid md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
  </main>

  <script src="inventory.js"></script>
</body>
</html>
