<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | Jaya Gems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="order-details.css">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>

    <nav class="menu-bar">
        <div class="logo">JAYA<span>GEMS</span></div>
        <button class="btn-back" onclick="window.location.href='cart.html'">
            <i class="fas fa-arrow-left"></i> Back to Cart
        </button>
    </nav>

    <div class="header-title">
        <h1>Order Status Board</h1>
        <p>Track your gems in real-time</p>"/sav
    </div>

    <main class="board-container">
        <div class="status-column processing-col">
            <div class="column-header">
                <h2><i class="fas fa-cog fa-spin"></i> Processing</h2>
                <span class="count" id="count-processing">0</span>
            </div>
            <div class="item-list" id="list-processing">
                </div>
        </div>

        <div class="status-column packed-col">
            <div class="column-header">
                <h2><i class="fas fa-box"></i> Packed</h2>
                <span class="count" id="count-packed">0</span>
            </div>
            <div class="item-list" id="list-packed">
                </div>
        </div>

        <div class="status-column delivered-col">
            <div class="column-header">
                <h2><i class="fas fa-truck"></i> Delivered</h2>
                <span class="count" id="count-delivered">0</span>
            </div>
            <div class="item-list" id="list-delivered">
                </div>
        </div>
    </main>

    <script src="order-details.js"></script>
</body>
</html>
