<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GemVault - Marketplace Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="inventory.css" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
</head>

<body class="text-slate-800 dark:text-slate-100">

<nav class="fixed w-full z-50 glass-panel border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-store text-3xl text-emerald-600 dark:text-emerald-400"></i>
            <span class="text-2xl font-bold tracking-tight">Marketplace Admin</span>
        </div>

        <div class="flex items-center gap-6">
            <button id="theme-toggle" class="icon-btn w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
            <a href="inventory.html" class="text-slate-600 dark:text-slate-300 hover:text-emerald-600 dark:hover:text-emerald-400 font-semibold transition">
                <i class="fas fa-arrow-left mr-1"></i> Back to Inventory
            </a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 pt-32 pb-12">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold">Pending Drafts</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Review inventory items and set final selling prices before publishing.</p>
    </div>

    <div id="emptyState" class="card p-12 text-center hidden">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-slate-900/5 dark:bg-white/10 flex items-center justify-center mb-4">
            <i class="fas fa-check-circle text-3xl text-emerald-500 dark:text-emerald-400"></i>
        </div>
        <h2 class="text-xl font-bold mb-2">All caught up!</h2>
        <p class="text-slate-600 dark:text-slate-400">There are no pending drafts from the Inventory team.</p>
    </div>

    <div id="draftsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>
</div>

<script src="marketplace-admin.js"></script>
</body>
</html>
